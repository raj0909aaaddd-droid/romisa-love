<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romisa ❤️ Raj</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><radialGradient id="a" cx="50%" cy="50%"><stop offset="0%" stop-color="%23ff9a9e" stop-opacity="0.3"/><stop offset="100%" stop-color="%23fecfef" stop-opacity="0"/></radialGradient></defs><circle cx="20" cy="20" r="2" fill="url(%23a)"><animate attributeName="r" values="2;3;2" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/></circle><circle cx="80" cy="80" r="1.5" fill="url(%23a)"><animate attributeName="r" values="1.5;2.5;1.5" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0.3;1" dur="4s" repeatCount="indefinite"/></circle></svg>') repeat;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 500px;
            width: 90%;
            position: relative;
            z-index: 2;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(255, 154, 158, 0.3);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s ease forwards;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .title {
            font-size: 2.5em;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .character-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
        }

        .lottie-player {
            width: 100%;
            height: 100%;
        }

        .character-fallback {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            margin: 10px auto;
            display: none;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .btn {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            box-shadow: 0 10px 20px rgba(255, 107, 157, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 107, 157, 0.6);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .question {
            font-size: 1.6em;
            color: #333;
            margin-bottom: 40px;
            line-height: 1.4;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .yes-no-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .yes-btn {
            background: linear-gradient(135deg, #ff6b9d, #ff8fab);
        }

        .no-btn {
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
        }

        .final-message {
            font-size: 1.3em;
            color: #333;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease 0.2s forwards;
        }

        .music-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .music-toggle:hover {
            transform: scale(1.1);
            background: rgba(255, 107, 157, 0.9);
            color: white;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 480px) {
            .title {
                font-size: 2em;
            }
            .question {
                font-size: 1.4em;
            }
            .card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <button class="music-toggle" id="musicToggle" title="Toggle Music">🎵</button>
    
    <audio id="bgMusic" loop>
        <source src="love.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="card" id="welcomeScreen">
            <div class="character-container">
                <lottie-player 
                    id="welcomeLottie" 
                    src="https://assets4.lottiefiles.com/packages/lf20_oeh9bhtt.json" 
                    background="transparent" 
                    speed="1" 
                    style="width: 100%; height: 100%;" 
                    loop 
                    autoplay>
                </lottie-player>
                <div class="character-fallback" id="welcomeFallback">
                    💕
                </div>
            </div>
            <div class="title">Romisa ❤️ Raj</div>
            <div class="subtitle">A special little world made just for you</div>
            <button class="btn" onclick="startExperience()">Start 💕</button>
        </div>

        <div class="card hidden" id="questionScreen">
            <div class="character-container">
                <lottie-player 
                    id="questionLottie" 
                    src="https://assets4.lottiefiles.com/packages/lf20_oeh9bhtt.json" 
                    background="transparent" 
                    speed="1" 
                    style="width: 100%; height: 100%;" 
                    loop 
                    autoplay>
                </lottie-player>
                <div class="character-fallback" id="questionFallback">
                    💕
                </div>
            </div>
            <div class="question" id="currentQuestion"></div>
            <div class="yes-no-container">
                <button class="btn yes-btn" onclick="answerYes()">Yes 💖</button>
                <button class="btn no-btn" onclick="answerNo()">No 😢</button>
            </div>
        </div>

        <div class="card hidden" id="finalScreen">
            <div class="character-container">
                <lottie-player 
                    id="finalLottie" 
                    src="https://assets4.lottiefiles.com/packages/lf20_oeh9bhtt.json" 
                    background="transparent" 
                    speed="0.8" 
                    style="width: 100%; height: 100%;" 
                    loop 
                    autoplay>
                </lottie-player>
                <div class="character-fallback" id="finalFallback">
                    💖✨
                </div>
            </div>
            <div class="final-message">
                I made this just for you. No matter the distance, my heart is always with you. I love you.
            </div>
            <button class="btn" onclick="restart()">Play Again 💕</button>
        </div>
    </div>

    <script>
        // Music control
        const musicToggle = document.getElementById('musicToggle');
        const bgMusic = document.getElementById('bgMusic');
        let musicPlaying = false;

        musicToggle.addEventListener('click', () => {
            if (musicPlaying) {
                bgMusic.pause();
                musicToggle.textContent = '🔇';
            } else {
                bgMusic.play().catch(() => {}); // Ignore autoplay errors
                musicToggle.textContent = '🎵';
            }
            musicPlaying = !musicPlaying;
        });

        // Lottie fallback
        function setupLottieFallback(lottieId, fallbackId) {
            const lottie = document.getElementById(lottieId);
            const fallback = document.getElementById(fallbackId);
            
            lottie.addEventListener('load', () => {
                fallback.style.display = 'none';
            });
            
            lottie.addEventListener('error', () => {
                fallback.style.display = 'block';
            });
        }

        setupLottieFallback('welcomeLottie', 'welcomeFallback');
        setupLottieFallback('questionLottie', 'questionFallback');
        setupLottieFallback('finalLottie', 'finalFallback');

        // Questions data
        const questions = [
            "Do you miss me? 💕",
            "Do I make you smile? 😊",
            "Do you love me? ❤️",
            "Would you hold my hand forever? 🤝",
            "Am I your favorite person? ✨"
        ];

        let currentQuestionIndex = 0;
        let yesCount = 0;

        function startExperience() {
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('questionScreen').classList.remove('hidden');
            showNextQuestion();
        }

        function showNextQuestion() {
            if (currentQuestionIndex < questions.length) {
                document.getElementById('currentQuestion').textContent = questions[currentQuestionIndex];
                currentQuestionIndex++;
            }
        }

        function answerYes() {
            yesCount++;
            showReaction('happy');
        }

        function answerNo() {
            showReaction('angry');
        }

        function showReaction(type) {
            const lottie = document.getElementById('questionLottie');
            const fallback = document.getElementById('questionFallback');
            
            if (type === 'happy') {
                lottie.load('https://assets1.lottiefiles.com/packages/lf20_yf3kcmhw.json'); // Happy dance
                fallback.textContent = '😍💖';
            } else {
                lottie.load('https://assets4.lottiefiles.com/packages/lf20_jguxmtwf.json'); // Angry/cute
                fallback.textContent = '😤💔';
            }
            
            setTimeout(() => {
                if (currentQuestionIndex < questions.length) {
                    showNextQuestion();
                    lottie.load('https://assets4.lottiefiles.com/packages/lf20_oeh9bhtt.json');
                    document.getElementById('questionFallback').textContent = '💕';
                } else {
                    showFinalScreen();
                }
            }, 2000);
        }

        function showFinalScreen() {
            document.getElementById('questionScreen').classList.add('hidden');
            document.getElementById('finalScreen').classList.remove('hidden');
            
            const finalLottie = document.getElementById('finalLottie');
            finalLottie.load('https://assets3.lottiefiles.com/packages/lf20_tddtpyr7.json'); // Romantic hearts
            document.getElementById('finalFallback').textContent = '💖💖💖';
        }

        function restart() {
            document.getElementById('finalScreen').classList.add('hidden');
            document.getElementById('welcomeScreen').classList.remove('hidden');
            
            currentQuestionIndex = 0;
            yesCount = 0;
            
            // Reset animations
            document.getElementById('welcomeLottie').load('https://assets4.lottiefiles.com/packages/lf20_oeh9bhtt.json');
            document.getElementById('welcomeFallback').textContent = '💕';
        }
    </script>
</body>
  </html>
