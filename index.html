<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romisa ❤️ Raj</title>

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fecfef);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.container{
  text-align:center;
  background:white;
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:420px;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

h1{
  color:#ff4f8f;
}

.question{
  font-size:20px;
  margin:20px 0;
  min-height:60px;
}

button{
  padding:12px 25px;
  margin:10px;
  border:none;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}

.yes{background:#ff4f8f;color:white;}
.no{background:#eee;}

.music{
  position:fixed;
  top:15px;
  right:15px;
  font-size:22px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="music" onclick="toggleMusic()">🎵</div>

<audio id="music" loop>
  <source src="love.mp3" type="audio/mpeg">
</audio>

<div class="container">

<lottie-player 
id="character"
src="https://assets10.lottiefiles.com/packages/lf20_jbrw3hcz.json"
background="transparent"
speed="1"
style="width:160px;height:160px;margin:auto;"
loop autoplay>
</lottie-player>

<h1>Romisa ❤️ Raj</h1>

<div id="screen1">
  <button onclick="start()">Start 💕</button>
</div>

<div id="screen2" style="display:none;">
  <div class="question" id="question"></div>
  <button class="yes" onclick="yes()">Yes 💖</button>
  <button class="no" id="noBtn">No 😤</button>
</div>

<div id="screen3" style="display:none;">
  <h2>I love you Romisa ❤️</h2>
  <p>You are my happiness, my peace, my everything.</p>
</div>

</div>

<script>

const questions = [
"Do you miss me? 💕",
"Do I make you smile? 😊",
"Am I your favorite person? ❤️",
"Do you think about me before sleeping? 🌙",
"Do you feel happy when I text you? 💌",
"Would you hug me if I was there? 🤗",
"Do you want to stay with me forever? 💖",
"Do I mean something special to you? ✨",
"Will you always choose me? ❤️"
];

let i = 0;

function start(){
  document.getElementById("screen1").style.display="none";
  document.getElementById("screen2").style.display="block";
  showQuestion();
}

function showQuestion(){
  document.getElementById("question").innerText = questions[i];
}

/* YES FLOW */
function yes(){
  setCharacter("love");
  i++;

  if(i<questions.length){
    setTimeout(()=>{
      setCharacter("normal");
      showQuestion();
    },1200);
  }else{
    end();
  }
}

/* END */
function end(){
  document.getElementById("screen2").style.display="none";
  document.getElementById("screen3").style.display="block";
  setCharacter("love");
}

/* ANIMATIONS */
function setCharacter(type){
  const c = document.getElementById("character");

  if(type==="love"){
    c.load("https://assets1.lottiefiles.com/packages/lf20_yf3kcmhw.json"); // love hearts
  }
  else if(type==="angry"){
    c.load("https://assets4.lottiefiles.com/packages/lf20_jguxmtwf.json"); // angry cute
  }
  else{
    c.load("https://assets10.lottiefiles.com/packages/lf20_jbrw3hcz.json"); // normal cute
  }
}

/* NO BUTTON RUN AWAY */
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("touchstart", (e)=>{
  e.preventDefault();
  moveNo();
});

function moveNo(){
  setCharacter("angry");

  const x = Math.random()*250-125;
  const y = Math.random()*250-125;

  noBtn.style.position="relative";
  noBtn.style.left = x+"px";
  noBtn.style.top = y+"px";
}

/* MUSIC */
function toggleMusic(){
  const m = document.getElementById("music");
  if(m.paused){
    m.play();
  }else{
    m.pause();
  }
}

/* autoplay fix */
document.body.addEventListener("click",()=>{
  document.getElementById("music").play().catch(()=>{});
},{once:true});

</script>

</body>
  </html>
