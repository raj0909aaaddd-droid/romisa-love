<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romisa ❤️ Raj</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#1a1a2e,#ff4d6d);
    text-align: center;
    padding: 20px;
    color: white;
    overflow: hidden;
}

/* Card */
.container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 20px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 0 20px rgba(255,77,109,0.6);
}

/* Text */
h1 {
    color: #ff4d6d;
    text-shadow: 0 0 10px #ff4d6d;
}

/* Buttons */
button {
    padding: 12px 25px;
    margin: 10px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
}

.yes { background: #ff4d6d; color: white; }
.no { background: gray; color: white; position: absolute; }

/* Anime image */
.anime-img {
    width: 200px;
    border-radius: 15px;
    margin-bottom: 15px;
}

/* Start music button */
#startMusic {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #ff4d6d;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    display: none;
}

/* Floating hearts */
.heart {
    position: fixed;
    bottom: -20px;
    font-size: 20px;
    animation: floatUp 4s linear forwards;
}

@keyframes floatUp {
    to {
        transform: translateY(-100vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<button id="startMusic" onclick="startMusic()">Tap for music ❤️</button>

<div class="container" id="game">

<img class="anime-img" src="https://i.imgur.com/8Km9tLL.png">

<h1 id="question"></h1>

<button class="yes" onclick="next()">Yes 💖</button>
<button class="no" id="noBtn" onmouseover="move()">No 😏</button>

</div>

<div class="container" id="final" style="display:none;">

<img class="anime-img" src="https://i.imgur.com/QZ6FZ5C.png">

<h1>Romisa ❤️</h1>

<p>
You are my favorite person 🥺💖<br>
Even far away, you make me happy ❤️<br>
– Raj
</p>

<img src="https://media.giphy.com/media/Ju7l5y9osyymQ/giphy.gif" width="200">

<br><br>
<button onclick="surprise()">Open Surprise 🎁</button>

</div>

<script>
let q = 0;

const questions = [
"Romisa, do you love Raj? 😍",
"Do you miss him? 😌",
"Is Raj your favorite? 💕",
"Do you want a surprise? 🎁",
"Ready for it? 💖"
];

/* Load first */
document.getElementById("question").innerText = questions[0];

/* Next question */
function next() {
    q++;
    if(q < questions.length){
        document.getElementById("question").innerText = questions[q];
    } else {
        document.getElementById("game").style.display = "none";
        document.getElementById("final").style.display = "block";
    }
}

/* No button run */
function move() {
    let btn = document.getElementById("noBtn");
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

/* Surprise */
function surprise() {
    alert("Check your WhatsApp 💖");
}

/* MUSIC LOGIC */
let music = document.getElementById("bgMusic");

window.onload = function() {
    music.play().catch(() => {
        document.getElementById("startMusic").style.display = "block";
    });
};

function startMusic() {
    music.play();
    document.getElementById("startMusic").style.display = "none";
}

/* HEART ANIMATION */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
}, 500);

</script>

</body>
  </html>
