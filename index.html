<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Romisa ❤️ Raj</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hearts-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .heart {
      position: absolute;
      font-size: 20px;
      color: #ff69b4;
      pointer-events: none;
      animation: float 3s ease-out forwards;
    }

    @keyframes float {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-100vh) scale(0);
      }
    }

    .main-container {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 400px;
      height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 40px 30px;
      width: 100%;
      height: 100%;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .character {
      width: 150px;
      height: 150px;
      margin-bottom: 30px;
      object-fit: contain;
      transition: all 0.5s ease;
    }

    .title {
      font-size: clamp(28px, 5vw, 42px);
      color: #ff6b9d;
      margin-bottom: 15px;
      text-align: center;
      text-shadow: 0 2px 10px rgba(255, 107, 157, 0.3);
      animation: fadeInUp 1s ease;
      font-weight: 800;
    }

    .subtitle {
      font-size: clamp(16px, 3vw, 20px);
      color: #ff8fab;
      margin-bottom: 40px;
      text-align: center;
      animation: fadeInUp 1s ease 0.2s both;
    }

    .btn {
      background: linear-gradient(135deg, #ff6b9d, #ff8fab);
      color: white;
      border: none;
      padding: 18px 40px;
      border-radius: 50px;
      font-size: clamp(16px, 3vw, 20px);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
      min-width: 200px;
      margin: 10px;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px rgba(255, 107, 157, 0.5);
    }

    .btn:active {
      transform: translateY(-1px);
    }

    .question {
      font-size: clamp(22px, 4vw, 28px);
      color: #ff4757;
      text-align: center;
      margin-bottom: 40px;
      line-height: 1.4;
      animation: fadeInUp 0.8s ease;
      max-width: 90%;
      font-weight: 700;
    }

    .progress {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.25);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }

    .music-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      font-size: 24px;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      color: white;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    }

    .music-toggle:hover {
      transform: scale(1.1);
      background: rgba(255, 255, 255, 0.3);
    }

    .no-btn {
      animation: wiggle 0.12s infinite;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-2deg); }
      75% { transform: rotate(2deg); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes heartBurst {
      0% {
        transform: scale(0) rotate(0deg);
        opacity: 1;
      }
      50% {
        transform: scale(1.2) rotate(180deg);
        opacity: 1;
      }
      100% {
        transform: scale(0) rotate(360deg);
        opacity: 0;
      }
    }

    .heart-burst {
      position: absolute;
      font-size: 30px;
      color: #ff1493;
      pointer-events: none;
      animation: heartBurst 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 20;
    }

    .final-message {
      text-align: center;
      color: #ff4757;
      line-height: 1.6;
      animation: fadeInUp 1s ease;
    }

    .final-title {
      font-size: clamp(32px, 6vw, 48px);
      font-weight: 800;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #ff6b9d, #ff4757);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .glow {
      animation: glow 1s ease-in-out;
    }

    @keyframes glow {
      0%, 100% {
        box-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
      }
      50% {
        box-shadow: 0 0 40px rgba(255, 107, 157, 0.8), 0 0 60px rgba(255, 107, 157, 0.4);
      }
    }

    @media (max-width: 480px) {
      .glass-card {
        padding: 30px 20px;
        margin: 20px;
      }

      .character {
        width: 120px;
        height: 120px;
      }
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="hearts-container" id="heartsContainer"></div>

  <button class="music-toggle" id="musicToggle" type="button">🔇</button>

  <audio id="bgMusic" loop>
    <source src="love.mp3" type="audio/mpeg" />
  </audio>

  <div class="main-container">
    <div class="glass-card" id="welcomeScreen">
      <img src="normal.gif" class="character" alt="Anime Character" />
      <div class="title">Romisa ❤️ Raj</div>
      <div class="subtitle">A little world made just for you</div>
      <button class="btn" id="startBtn" type="button">Start Our Story 💕</button>
    </div>

    <div class="glass-card hidden" id="questionsScreen">
      <div class="progress" id="progress">1 / 7</div>
      <img src="normal.gif" class="character" id="characterImg" alt="Anime Character" />
      <div class="question" id="questionText">Do you miss me? 💕</div>
      <button class="btn" id="yesBtn" type="button">YES 💖</button>
      <button class="btn" id="noBtn" type="button">NO 😤</button>
    </div>

    <div class="glass-card hidden glow" id="finalScreen">
      <img src="happy.gif" class="character" alt="Anime Character" />
      <div class="final-message">
        <div class="final-title">Romisa ❤️</div>
        <div>I made this just for you.</div>
        <div>No matter the distance,</div>
        <div>my heart is always with you.</div>
        <div style="font-size: 28px; margin-top: 20px; font-weight: 800;">I love you.</div>
      </div>
      <button class="btn" id="playAgainBtn" type="button">Play Again 💕</button>
    </div>
  </div>

  <script>
    class RomanticApp {
      constructor() {
        this.currentQuestion = 0;
        this.questions = [
          "Do you miss me? 💕",
          "Do I make you smile? 😊",
          "Am I your favorite person? 🌟",
          "Do you love our talks? 🌙",
          "Would you stay with me forever? ❤️",
          "Do you feel butterflies when you think of me? 🦋",
          "Am I your safe place? 🏠💕"
        ];
        this.noAttempts = 0;
        this.maxNoAttempts = 3;
        this.isMusicPlaying = false;
        this.noBtn = null;
        this.heartsInterval = null;
        this.init();
      }

      init() {
        this.bindEvents();
        this.createFloatingHearts();
        this.setupNoButton();
      }

      bindEvents() {
        document.getElementById('startBtn').addEventListener('click', () => this.startApp());
        document.getElementById('yesBtn').addEventListener('click', () => this.handleYes());
        document.getElementById('noBtn').addEventListener('click', () => this.handleNo());
        document.getElementById('playAgainBtn').addEventListener('click', () => this.restart());
        document.getElementById('musicToggle').addEventListener('click', () => this.toggleMusic());

        document.addEventListener('click', (e) => {
          if (e.target.closest('button')) return;
          this.createHeart(e.clientX, e.clientY);
        });

        document.addEventListener('touchstart', (e) => {
          const touch = e.touches[0];
          if (!touch) return;
          if (e.target.closest('button')) return;
          this.createHeart(touch.clientX, touch.clientY);
        }, { passive: true });
      }

      startApp() {
        const music = document.getElementById('bgMusic');
        music.volume = 0.3;
        music.play().then(() => {
          this.isMusicPlaying = true;
          document.getElementById('musicToggle').textContent = '🎵';
        }).catch(() => {
          this.isMusicPlaying = false;
          document.getElementById('musicToggle').textContent = '🔇';
        });

        document.getElementById('welcomeScreen').classList.add('hidden');
        document.getElementById('questionsScreen').classList.remove('hidden');
        this.updateQuestion();
      }

      updateQuestion() {
        if (this.currentQuestion < this.questions.length) {
          document.getElementById('questionText').textContent = this.questions[this.currentQuestion];
          document.getElementById('progress').textContent =
            `${this.currentQuestion + 1} / ${this.questions.length}`;
          document.getElementById('characterImg').src = 'normal.gif';
          document.getElementById('characterImg').style.animation = '';
          this.noAttempts = 0;
          document.getElementById('noBtn').textContent = 'NO 😤';
          this.resetNoButtonPosition();
        } else {
          this.showFinalScreen();
        }
      }

      handleYes() {
        const card = document.getElementById('questionsScreen');
        const rect = document.getElementById('yesBtn').getBoundingClientRect();

        this.createHeartBurst(rect.left + rect.width / 2, rect.top + rect.height / 2);
        document.getElementById('characterImg').src = 'happy.gif';
        card.classList.add('glow');

        setTimeout(() => {
          card.classList.remove('glow');
          this.currentQuestion++;
          this.updateQuestion();
        }, 1200);
      }

      handleNo() {
        this.noAttempts++;
        const img = document.getElementById('characterImg');
        const noBtn = document.getElementById('noBtn');

        img.src = 'angry.gif';
        img.style.animation = 'shake 0.5s ease-in-out';

        if (this.noAttempts >= this.maxNoAttempts) {
          noBtn.textContent = "Don’t do this 😭";
        } else if (this.noAttempts === 2) {
          noBtn.textContent = "Are you sure? 🥺";
        }

        setTimeout(() => {
          img.style.animation = '';
          img.src = 'normal.gif';
        }, 1200);
      }

      setupNoButton() {
        this.noBtn = document.getElementById('noBtn');

        const moveNoButton = (clientX, clientY) => {
          if (!this.noBtn) return;

          const card = document.getElementById('questionsScreen');
          const rect = card.getBoundingClientRect();

          const maxX = rect.width - this.noBtn.offsetWidth - 20;
          const maxY = rect.height - this.noBtn.offsetHeight - 20;

          let x = clientX - rect.left;
          let y = clientY - rect.top;

          x = Math.max(20, Math.min(maxX, x));
          y = Math.max(120, Math.min(maxY, y));

          this.noBtn.style.position = 'absolute';
          this.noBtn.style.left = x + 'px';
          this.noBtn.style.top = y + 'px';
          this.noBtn.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
          this.noBtn.classList.add('no-btn');
        };

        this.noBtn.addEventListener('mouseenter', (e) => {
          moveNoButton(e.clientX, e.clientY);
        });

        this.noBtn.addEventListener('touchstart', (e) => {
          const touch = e.touches[0];
          if (!touch) return;
          moveNoButton(touch.clientX, touch.clientY);
        }, { passive: true });
      }

      resetNoButtonPosition() {
        if (!this.noBtn) return;
        this.noBtn.style.position = 'relative';
        this.noBtn.style.left = '0';
        this.noBtn.style.top = '0';
        this.noBtn.style.transition = '';
        this.noBtn.classList.remove('no-btn');
      }

      showFinalScreen() {
        document.getElementById('questionsScreen').classList.add('hidden');
        document.getElementById('finalScreen').classList.remove('hidden');
      }

      restart() {
        this.currentQuestion = 0;
        this.noAttempts = 0;
        document.getElementById('finalScreen').classList.add('hidden');
        document.getElementById('questionsScreen').classList.remove('hidden');
        document.getElementById('questionsScreen').classList.remove('glow');
        this.updateQuestion();
      }

      toggleMusic() {
        const music = document.getElementById('bgMusic');
        const toggle = document.getElementById('musicToggle');

        if (this.isMusicPlaying) {
          music.pause();
          toggle.textContent = '🔇';
          this.isMusicPlaying = false;
        } else {
          music.play().then(() => {
            toggle.textContent = '🎵';
            this.isMusicPlaying = true;
          }).catch(() => {
            toggle.textContent = '🔇';
            this.isMusicPlaying = false;
          });
        }
      }

      createHeart(x, y) {
        const heart = document.createElement('div');
        heart.innerHTML = '💖';
        heart.className = 'heart';
        heart.style.left = x + 'px';
        heart.style.top = y + 'px';
        document.getElementById('heartsContainer').appendChild(heart);

        setTimeout(() => heart.remove(), 3000);
      }

      createHeartBurst(x, y) {
        for (let i = 0; i < 6; i++) {
          setTimeout(() => {
            this.createHeart(
              x + (Math.random() - 0.5) * 100,
              y + (Math.random() - 0.5) * 100
            );
          }, i * 100);
        }
      }

      createFloatingHearts() {
        if (this.heartsInterval) clearInterval(this.heartsInterval);
        this.heartsInterval = setInterval(() => {
          const x = Math.random() * window.innerWidth;
          this.createHeart(x, window.innerHeight);
        }, 3000);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new RomanticApp();
    });
  </script>
</body>
  </html>
