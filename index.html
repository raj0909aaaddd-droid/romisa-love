<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romisa ❤️ Raj</title>

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',sans-serif;
  height:100vh;
  overflow:hidden;
  background:linear-gradient(135deg,#ff9a9e,#fecfef);
  display:flex;
  justify-content:center;
  align-items:center;
}

/* floating hearts */
.heart{
  position:fixed;
  bottom:-20px;
  font-size:20px;
  animation:float 6s linear forwards;
}
@keyframes float{
  to{transform:translateY(-110vh);opacity:0;}
}

/* container */
.screen{
  width:92%;
  max-width:420px;
  background:rgba(255,255,255,0.95);
  border-radius:25px;
  padding:30px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
  display:none;
}
.screen.active{display:block;}

h1{
  font-size:32px;
  color:#ff4f8f;
  margin-bottom:10px;
}

p{
  color:#a04c6a;
  margin-bottom:20px;
}

button{
  padding:14px 25px;
  border:none;
  border-radius:25px;
  margin:8px;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

.yes{background:#ff4f8f;color:white;}
.no{background:#ddd;}

button:hover{transform:scale(1.05);}

/* music button */
.music{
  position:fixed;
  top:15px;
  right:15px;
  background:white;
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* question */
#question{
  font-size:20px;
  margin:20px 0;
}
</style>
</head>

<body>

<audio id="musicPlayer" loop>
  <source src="love.mp3" type="audio/mpeg">
</audio>

<div class="music" onclick="toggleMusic()">🎵</div>

<!-- WELCOME -->
<div class="screen active" id="welcome">
  <lottie-player
    src="https://assets2.lottiefiles.com/packages/lf20_kkflmtur.json"
    style="width:200px;height:200px;margin:auto;"
    loop autoplay>
  </lottie-player>

  <h1>Romisa ❤️ Raj</h1>
  <p>A special little world made just for you</p>
  <button onclick="start()" class="yes">Start 💕</button>
</div>

<!-- QUESTIONS -->
<div class="screen" id="quiz">
  <lottie-player id="anime"
    src="https://assets2.lottiefiles.com/packages/lf20_kkflmtur.json"
    style="width:180px;height:180px;margin:auto;"
    loop autoplay>
  </lottie-player>

  <div id="question"></div>

  <button class="yes" onclick="answer(true)">Yes 💖</button>
  <button class="no" onclick="answer(false)">No 😤</button>
</div>

<!-- FINAL -->
<div class="screen" id="final">
  <lottie-player
    src="https://assets7.lottiefiles.com/packages/lf20_touohxv0.json"
    style="width:200px;height:200px;margin:auto;"
    loop autoplay>
  </lottie-player>

  <h1>I love you Romisa 💖</h1>
  <p>No matter the distance, my heart is always with you.</p>
</div>

<script>
const music = document.getElementById("musicPlayer");

function toggleMusic(){
  if(music.paused){
    music.play();
  }else{
    music.pause();
  }
}

function start(){
  music.play().catch(()=>{});
  show("quiz");
  next();
}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* hearts background */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},800);

/* questions */
let i=0;
const questions=[
"Do you miss me? 💕",
"Do I make you smile? 😊",
"Am I your favorite? 😌",
"Do you love me? 💖"
];

function next(){
  if(i<questions.length){
    document.getElementById("question").innerText=questions[i];
  }else{
    show("final");
  }
}

function answer(yes){
  const anime=document.getElementById("anime");

  if(yes){
    anime.setAttribute("src",
    "https://assets7.lottiefiles.com/packages/lf20_touohxv0.json");
  }else{
    anime.setAttribute("src",
    "https://assets2.lottiefiles.com/packages/lf20_q5pk6p1k.json");
  }

  i++;
  setTimeout(next,900);
}
</script>

</body>
</html>
