<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romisa ❤️ Raj</title>

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#fff1f6,#ffdce8,#fff7fb);
  overflow:hidden;
  color:#7b3557;
}

/* Floating hearts */
.floating-heart {
  position:fixed;
  bottom:-20px;
  font-size:20px;
  animation: float 5s linear forwards;
}
@keyframes float {
  0% {opacity:0;}
  10% {opacity:1;}
  100% {transform:translateY(-120vh); opacity:0;}
}

/* Screens */
.screen {
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
}
.screen.active { display:flex; }

/* Card */
.card {
  width:92%;
  max-width:500px;
  background:rgba(255,255,255,0.9);
  padding:25px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 15px 40px rgba(255,0,100,0.2);
}

/* Titles */
.title {
  font-size:40px;
  font-weight:800;
  background:linear-gradient(135deg,#ff4f8f,#ff7cab);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle {
  margin:10px 0 20px;
  color:#a64d79;
}

/* Buttons */
.btn {
  padding:14px 25px;
  border:none;
  border-radius:30px;
  font-weight:600;
  cursor:pointer;
  margin:8px;
}
.btn-primary {
  background:linear-gradient(135deg,#ff4f8f,#ff7cab);
  color:white;
}
.btn-yes {
  background:#ff4f8f;
  color:white;
}
.btn-no {
  background:#a8e6cf;
}

/* Music button */
.music-control {
  position:fixed;
  top:15px;
  right:15px;
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  font-size:20px;
  background:white;
  cursor:pointer;
}

/* Speech */
.speech {
  background:white;
  padding:15px;
  border-radius:20px;
  margin:15px 0;
  font-weight:600;
}

/* Game */
.heart-game-area {
  width:100%;
  height:300px;
  position:relative;
}
.tap-heart {
  position:absolute;
  font-size:30px;
  cursor:pointer;
}

/* Gifts */
.gift {
  font-size:40px;
  margin:10px;
  cursor:pointer;
}

/* Notes */
.note {
  background:white;
  padding:10px;
  margin:5px;
  border-radius:10px;
  cursor:pointer;
}

/* Letter */
.letter {
  text-align:left;
  line-height:1.6;
}

</style>
</head>

<body>

<audio id="loveMusic" loop>
  <source src="love.mp3" type="audio/mpeg">
</audio>

<button class="music-control" onclick="toggleMusic()">🎵</button>

<!-- WELCOME -->
<div class="screen active" id="welcome">
  <div class="card">
    <lottie-player src="https://assets10.lottiefiles.com/packages/lf20_jbrw3hcz.json" background="transparent" speed="1" style="width:150px;height:150px;" loop autoplay></lottie-player>
    <div class="title">Romisa ❤️ Raj</div>
    <div class="subtitle">A little world made just for you</div>
    <button class="btn btn-primary" onclick="start()">Start 💕</button>
  </div>
</div>

<!-- QUESTIONS -->
<div class="screen" id="questions">
  <div class="card">
    <div class="speech" id="speech"></div>
    <button class="btn btn-yes" onclick="answer(true)">Yes 💖</button>
    <button class="btn btn-no" onclick="answer(false)">No 😤</button>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div class="card">
    <div>Tap 10 hearts 💖</div>
    <div class="heart-game-area" id="gameArea"></div>
    <div id="count">0 / 10</div>
  </div>
</div>

<!-- GIFTS -->
<div class="screen" id="gifts">
  <div class="card">
    <div>Open all gifts 🎁</div>
    <div id="giftBox"></div>
  </div>
</div>

<!-- NOTES -->
<div class="screen" id="notes">
  <div class="card">
    <div id="notesBox"></div>
    <button class="btn btn-primary" onclick="show('letter')">Continue</button>
  </div>
</div>

<!-- LETTER -->
<div class="screen" id="letter">
  <div class="card letter">
    <h3>For Romisa ❤️</h3>
    <p>You mean more to me than words can explain.</p>
    <p>No matter the distance, my heart stays with you.</p>
    <p>I love you 💖</p>
    <p style="text-align:center;">– Raj</p>
    <button class="btn btn-primary" onclick="show('final')">Final 💕</button>
  </div>
</div>

<!-- FINAL -->
<div class="screen" id="final">
  <div class="card">
    <div class="title">Romisa ❤️</div>
    <p>I love you forever 💖</p>
  </div>
</div>

<script>
const music = document.getElementById('loveMusic');

function toggleMusic(){
  if(music.paused){ music.play(); }
  else{ music.pause(); }
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* Hearts background */
setInterval(()=>{
  let h=document.createElement('div');
  h.className='floating-heart';
  h.innerHTML='💖';
  h.style.left=Math.random()*100+'vw';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
},800);

/* Questions */
let q=0;
const questions=[
"Do you miss me? 💖",
"Do I make you smile? 🥺",
"Am I your favorite? 😌",
"Do you love me? 💕"
];

function start(){
  show('questions');
  document.getElementById('speech').innerText=questions[q];
}

function answer(){
  q++;
  if(q<questions.length){
    document.getElementById('speech').innerText=questions[q];
  }else{
    startGame();
  }
}

/* Game */
let score=0;
function startGame(){
  show('game');
  let area=document.getElementById('gameArea');
  let count=document.getElementById('count');

  let interval=setInterval(()=>{
    let heart=document.createElement('div');
    heart.className='tap-heart';
    heart.innerHTML='💖';
    heart.style.left=Math.random()*90+'%';
    heart.style.top=Math.random()*80+'%';

    heart.onclick=()=>{
      heart.remove();
      score++;
      count.innerText=score+" / 10";
      if(score>=10){
        clearInterval(interval);
        startGifts();
      }
    };

    area.appendChild(heart);
    setTimeout(()=>heart.remove(),2000);

  },500);
}

/* Gifts */
function startGifts(){
  show('gifts');
  let box=document.getElementById('giftBox');

  for(let i=0;i<4;i++){
    let g=document.createElement('div');
    g.className='gift';
    g.innerHTML='🎁';
    g.onclick=()=>{
      g.innerHTML='💝';
      startNotes();
    };
    box.appendChild(g);
  }
}

/* Notes */
function startNotes(){
  show('notes');
  let box=document.getElementById('notesBox');
  box.innerHTML='';
  ["You are special 💖","You make me happy","I miss you","I love you"].forEach(t=>{
    let n=document.createElement('div');
    n.className='note';
    n.innerText=t;
    box.appendChild(n);
  });
}

</script>

</body>
  </html>
